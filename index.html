<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JO-TRANS | Cloud System Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCvdAFDBeciiSqsnAjW8PXx-pxv64ztdhU",
            authDomain: "jtn-pr-control.firebaseapp.com",
            projectId: "jtn-pr-control",
            storageBucket: "jtn-pr-control.firebasestorage.app",
            messagingSenderId: "921630437726",
            appId: "1:921630437726:web:811585e1c987d7fea79fcf"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db;
        window.setDoc = setDoc;
        window.doc = doc;
        window.getDoc = getDoc;
        window.deleteDoc = deleteDoc;
    </script>

    <style>
        .row-received { background-color: #dcfce7 !important; }
        #loader { display: none; background: rgba(0,0,0,0.1); }
        .btn-action { transition: all 0.2s ease; }
        .btn-action:hover { transform: translateY(-1px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div id="loader" class="fixed inset-0 z-50 flex items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-blue-900"></div>
    </div>

    <div class="container mx-auto p-4 md:p-8">
        <header class="mb-6 flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-xl shadow-sm border-l-8 border-blue-900">
            <div>
                <h1 class="text-2xl font-bold text-blue-900 tracking-tight">JO-TRANS SYSTEM</h1>
                <p class="text-sm text-gray-500 font-medium">Monitoring Tanda Terima DT | jtn-pr-control</p>
            </div>
            <div id="statusMsg" class="hidden px-4 py-2 rounded-lg font-bold text-xs shadow-sm"></div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                <label class="block mb-2 font-bold text-[10px] text-gray-400 uppercase tracking-widest">1. File Management</label>
                <input type="file" id="uploadInput" accept=".csv, .xlsx" class="w-full text-xs text-gray-500 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:bg-blue-50 file:text-blue-700 file:font-bold hover:file:bg-blue-100" />
            </div>
            
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                <label class="block mb-2 font-bold text-[10px] text-gray-400 uppercase tracking-widest">2. Filter Search</label>
                <input type="text" id="searchInput" onkeyup="handleSearch()" placeholder="Cari data..." class="w-full px-3 py-2 text-sm border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 lg:col-span-2 flex items-end gap-2">
                <button onclick="uploadToFirebase()" class="btn-action flex-1 bg-blue-900 hover:bg-black text-white font-bold py-2.5 rounded-lg text-sm shadow-md">☁️ SAVE CLOUD</button>
                <button onclick="downloadReport()" class="btn-action bg-green-600 hover:bg-green-700 text-white px-4 py-2.5 rounded-lg text-sm shadow-md">📊 EXPORT</button>
                <button onclick="resetSystem()" class="btn-action bg-red-50 hover:bg-red-600 hover:text-white text-red-600 font-bold px-4 py-2.5 rounded-lg text-sm border border-red-100 transition-all">⚠️ RESET</button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
            <div class="overflow-x-auto max-h-[550px]">
                <table class="min-w-full">
                    <thead class="sticky top-0 bg-gray-50 shadow-sm z-10 text-[11px] font-bold text-gray-600 uppercase">
                        <tr>
                            <th class="px-6 py-4 text-left">Delivery Ticket</th>
                            <th class="px-6 py-4 text-left">Transporter</th>
                            <th class="px-6 py-4 text-left">CO No</th>
                            <th class="px-6 py-4 text-left">Customer</th>
                            <th class="px-6 py-4 text-left">Status</th>
                            <th class="px-6 py-4 text-left border-l">Tgl Diterima</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-100 text-sm">
                        <tr><td colspan="6" class="px-6 py-20 text-center text-gray-400 italic">Memuat data dari cloud...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let globalData = [];

        async function init() {
            toggleLoader(true);
            try {
                const docSnap = await window.getDoc(window.doc(window.db, "monitoring_dt", "current_status"));
                if (docSnap.exists()) {
                    globalData = docSnap.data().items;
                    renderTable(globalData);
                    showMsg("Cloud Synced", "bg-green-500 text-white");
                } else {
                    renderTable([]);
                }
            } catch (e) { showMsg("Cloud Error", "bg-red-500 text-white"); }
            toggleLoader(false);
        }

        setTimeout(init, 1500);

        function formatDate() {
            const date = new Date();
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            return `${String(date.getDate()).padStart(2, '0')}-${months[date.getMonth()]}-${String(date.getFullYear()).substring(2)}`;
        }

        async function uploadToFirebase() {
            if (globalData.length === 0) return alert("Upload data dulu!");
            toggleLoader(true);
            try {
                await window.setDoc(window.doc(window.db, "monitoring_dt", "current_status"), {
                    items: globalData,
                    updatedAt: new Date().toISOString()
                });
                showMsg("Saved to Cloud", "bg-blue-600 text-white");
            } catch (e) { alert("Gagal: " + e.message); }
            toggleLoader(false);
        }

        async function resetSystem() {
            if (confirm("⚠️ PERHATIAN: Ini akan menghapus SEMUA data di tabel dan di CLOUD FIREBASE. Anda yakin?")) {
                toggleLoader(true);
                try {
                    await window.deleteDoc(window.doc(window.db, "monitoring_dt", "current_status"));
                    globalData = [];
                    renderTable([]);
                    document.getElementById('uploadInput').value = '';
                    showMsg("Database Dibersihkan", "bg-gray-800 text-white");
                } catch (e) { alert("Gagal reset: " + e.message); }
                toggleLoader(false);
            }
        }

        document.getElementById('uploadInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (evt) => {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                globalData = json.map(item => ({
                    ...item, 
                    'Tanda Terima': item['Tanda Terima'] || 'Belum Diterima',
                    'Tgl Diterima': item['Tgl Diterima'] || ''
                }));
                renderTable(globalData);
            };
            reader.readAsArrayBuffer(file);
        });

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-20 text-center text-gray-400 italic">Database Kosong.</td></tr>';
                return;
            }
            data.forEach((row) => {
                const isReceived = row['Tanda Terima'] === 'Sudah Diterima';
                const dtID = row['Delivery Ticket'] || row['DT'] || '-';
                const tr = document.createElement('tr');
                if (isReceived) tr.classList.add('row-received');
                
                tr.innerHTML = `
                    <td class="px-6 py-4 font-bold text-gray-800">${dtID}</td>
                    <td class="px-6 py-4 text-gray-600 text-xs">${row['Transporter'] || '-'}</td>
                    <td class="px-6 py-4 font-medium text-blue-700">${row['CO No'] || row['Order'] || '-'}</td>
                    <td class="px-6 py-4 text-gray-500 text-xs">${row['Customer'] || '-'}</td>
                    <td class="px-6 py-4">
                        <select onchange="updateStatus('${dtID}', this.value, this)" 
                            class="rounded border p-1 text-[10px] font-bold ${isReceived ? 'bg-green-600 text-white' : 'bg-white text-gray-700'}">
                            <option value="Belum Diterima" ${!isReceived ? 'selected' : ''}>❌ BELUM</option>
                            <option value="Sudah Diterima" ${isReceived ? 'selected' : ''}>✅ SUDAH</option>
                        </select>
                    </td>
                    <td class="px-6 py-4 font-bold text-gray-600 tgl-cell border-l">${row['Tgl Diterima'] || '-'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateStatus(dtID, value, el) {
            const idx = globalData.findIndex(i => (i['Delivery Ticket'] || i['DT']) == dtID);
            if (idx !== -1) {
                const row = el.closest('tr');
                const tglCell = row.querySelector('.tgl-cell');
                globalData[idx]['Tanda Terima'] = value;
                if (value === 'Sudah Diterima') {
                    const tgl = formatDate();
                    globalData[idx]['Tgl Diterima'] = tgl;
                    tglCell.innerText = tgl;
                    row.classList.add('row-received');
                    el.className = "rounded border p-1 text-[10px] font-bold bg-green-600 text-white";
                } else {
                    globalData[idx]['Tgl Diterima'] = '';
                    tglCell.innerText = '-';
                    row.classList.remove('row-received');
                    el.className = "rounded border p-1 text-[10px] font-bold bg-white text-gray-700";
                }
            }
        }

        function handleSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = globalData.filter(row => Object.values(row).some(v => String(v).toLowerCase().includes(term)));
            renderTable(filtered);
        }

        function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
        function showMsg(t, c) {
            const el = document.getElementById('statusMsg');
            el.innerText = t; el.className = `px-4 py-2 rounded-lg font-bold text-[10px] tracking-widest ${c}`;
            el.classList.remove('hidden'); setTimeout(() => el.classList.add('hidden'), 3000);
        }
        function downloadReport() {
            if (globalData.length === 0) return;
            const ws = XLSX.utils.json_to_sheet(globalData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Report");
            XLSX.writeFile(wb, `JO_TRANS_REPORT_${formatDate()}.xlsx`);
        }
    </script>
</body>
</html>
